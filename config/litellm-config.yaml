model_list:
  - model_name: vertex-gemini-2.5-flash
    litellm_params:
      model: vertex_ai/gemini-2.5-flash

  - model_name: vertex-gemini-2.5-flash-lite
    litellm_params:
      model: vertex_ai/gemini-2.5-flash-lite

  - model_name: vertex-gemini-2.5-pro
    litellm_params:
      model: vertex_ai/gemini-2.5-pro

litellm_settings:
  telemetry: false
  drop_params: true
  num_retries: 2
  request_timeout: 600
  timezone: Asia/Shanghai
  max_internal_user_budget: 50
  internal_user_budget_duration: 7d
  default_internal_user_params:
    models:
      - vertex-gemini-2.5-flash
      - vertex-gemini-2.5-flash-lite
      - vertex-gemini-2.5-pro

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  custom_auth: auth_handler.user_api_key_auth
  custom_auth_run_common_checks: true
